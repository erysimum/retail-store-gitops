apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicas | default 1 }}

  selector:
    matchLabels:
      {{- include "microservice.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "microservice.selectorLabels" . | nindent 8 }}

    spec:
      serviceAccountName: {{ .Values.name }}

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: {{ .Values.name }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}

          ports:
            - name: http
              containerPort: {{ .Values.port | default 8080 }}

          {{- if .Values.env }}
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}

          {{- if .Values.healthCheck }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.livenessDelay | default 30 }}
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.readinessDelay | default 10 }}
            periodSeconds: 5
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- range .Values.volumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}

      volumes:
        - name: tmp
          emptyDir: {}

        {{- range .Values.volumes }}
        - name: {{ .name }}
          {{- if .configMap }}
          configMap:
            name: {{ .configMap.name }}
          {{- end }}
          {{- if .secret }}
          secret:
            secretName: {{ .secret.secretName }}
          {{- end }}
          {{- if .emptyDir }}
          emptyDir: {}
          {{- end }}
        {{- end }}