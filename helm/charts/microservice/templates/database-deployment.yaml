# retail-store-gitops/helm/charts/microservice/templates/database-deployment.yaml
{{- if .Values.database.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.database.name }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
    app: {{ .Values.database.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.database.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.database.name }}
    spec:
      containers:
        - name: {{ .Values.database.name }}
          image: {{ .Values.database.image }}
          ports:
            - containerPort: {{ .Values.database.port }}
          {{- if .Values.database.env }}
          env:
            {{- toYaml .Values.database.env | nindent 12 }}
          {{- end }}
          {{- if .Values.database.healthCheck }}
          {{- if .Values.database.healthCheck.command }}
          readinessProbe:
            exec:
              command:
                {{- toYaml .Values.database.healthCheck.command | nindent 16 }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                {{- toYaml .Values.database.healthCheck.command | nindent 16 }}
            initialDelaySeconds: 30
            periodSeconds: 10
          {{- else }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.database.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          {{- end }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.name | default (printf "%s-data" .Values.name) }}
      {{- end }}
{{- end }}