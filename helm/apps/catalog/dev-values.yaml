# Catalog service — Go app, serves product catalog from MySQL
name: catalog

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-catalog
  tag: "0.8.3"

replicas: 1

port: 8080

healthCheck:
  path: /health            # Go app — no framework convention, custom /health
  livenessDelay: 15        # Go starts fast, no JVM warmup
  readinessDelay: 5

env:
  - name: RETAIL_CATALOG_PERSISTENCE_PROVIDER
    value: "mysql"
  # DB endpoint will be updated when RDS is provisioned
  # For now, using in-memory mode (app defaults to in-memory if DB unavailable)

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    memory: "256Mi"         # Go is memory-efficient, doesn't need 512Mi

service:
  type: ClusterIP
  port: 80

serviceAccount:
  annotations: {}