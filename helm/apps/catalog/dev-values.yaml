# Catalog service — Go app, serves product catalog
# Database: MariaDB (catalog-db in same namespace)
# Source: docker-compose catalog + catalog-db sections
name: catalog

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-catalog
  tag: "1.4.0"

replicas: 1
port: 8080

healthCheck:
  path: /health
  livenessDelay: 15
  readinessDelay: 5

# Env vars from docker-compose
env:
  - name: RETAIL_CATALOG_PERSISTENCE_PROVIDER
    value: "mysql"
  - name: RETAIL_CATALOG_PERSISTENCE_ENDPOINT
    value: "catalog-db:3306"
  - name: RETAIL_CATALOG_PERSISTENCE_PASSWORD
    value: "password"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    memory: "256Mi"

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  annotations: {}

# MariaDB companion container for dev
# Health check from docker-compose: mysqladmin ping
database:
  enabled: true
  name: catalog-db
  image: mariadb:10.9
  port: 3306
  env:
    - name: MYSQL_ROOT_PASSWORD
      value: "password"
    - name: MYSQL_ALLOW_EMPTY_PASSWORD
      value: "true"
    - name: MYSQL_DATABASE
      value: "catalogdb"
    - name: MYSQL_USER
      value: "catalog_user"
    - name: MYSQL_PASSWORD
      value: "password"
  healthCheck:
    command:
      - mysqladmin
      - ping
      - -h
      - localhost
      - -u
      - catalog_user
      - -ppassword
    initialDelay: 30
    period: 10
    timeout: 5