# Cart service — Java/Spring Boot, shopping cart API
# Database: DynamoDB Local (carts-db in same namespace)
# Source: docker-compose cart + carts-db sections
name: cart

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-cart
  tag: "1.4.0"

replicas: 1
port: 8080

healthCheck:
  path: /actuator/health
  livenessDelay: 60
  readinessDelay: 30

# Env vars from docker-compose
env:
  - name: RETAIL_CART_PERSISTENCE_PROVIDER
    value: "dynamodb"
  - name: RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT
    value: "http://carts-db:8000"
  - name: RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE
    value: "true"
  - name: AWS_ACCESS_KEY_ID
    value: "key"
  - name: AWS_SECRET_ACCESS_KEY
    value: "dummy"

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    memory: "1Gi"

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  annotations: {}

# DynamoDB Local companion container for dev
# Health check: TCP socket on port 8000 (no CLI tool available)
# docker-compose uses "exit 0" — DynamoDB Local has no health endpoint
database:
  enabled: true
  name: carts-db
  image: amazon/dynamodb-local:1.20.0
  port: 8000
  env: []
  healthCheck:
    initialDelay: 10
    period: 10
    timeout: 5
    # No command = template uses tcpSocket on database.port (8000)