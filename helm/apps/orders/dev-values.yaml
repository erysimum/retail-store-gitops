# Orders service — Java/Spring Boot, order management
# Database: PostgreSQL (orders-db in same namespace)
# Source: docker-compose orders + orders-db sections
#
# NOTE: RabbitMQ skipped for now — orders works without it for basic dev
name: orders

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-orders
  tag: "1.4.0"

replicas: 1
port: 8080

healthCheck:
  path: /actuator/health
  livenessDelay: 60
  readinessDelay: 30

# Env vars from docker-compose
env:
  - name: RETAIL_ORDERS_PERSISTENCE_PROVIDER
    value: "postgres"
  - name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
    value: "orders-db:5432"
  - name: RETAIL_ORDERS_PERSISTENCE_NAME
    value: "orders"
  - name: RETAIL_ORDERS_PERSISTENCE_USERNAME
    value: "orders_user"
  - name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
    value: "password"

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    memory: "1Gi"

service:
  type: ClusterIP
  port: 80

serviceAccount:
  annotations: {}

# PostgreSQL companion container for dev
# Health check from docker-compose: pg_isready
database:
  enabled: true
  name: orders-db
  image: postgres:16.1
  port: 5432
  env:
    - name: POSTGRES_PASSWORD
      value: "password"
    - name: POSTGRES_DB
      value: "orders"
    - name: POSTGRES_USER
      value: "orders_user"
    - name: PGDATA
      value: "/var/lib/postgresql/data/pgdata"  
  healthCheck:
    command:
      - pg_isready
      - -d
      - orders
      - -U
      - orders_user
    initialDelay: 15
    period: 10
    timeout: 5

    
persistence:
  enabled: true
  storageClass: "gp3"
  size: "1Gi"
  mountPath: "/var/lib/postgresql/data"
  name: "orders-db-data"    