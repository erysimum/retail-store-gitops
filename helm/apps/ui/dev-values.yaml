# UI service — Java/Spring Boot, serves web frontend
# Calls: catalog, cart, checkout, orders
# Database: NONE (UI is a frontend, calls backend services)
name: ui

image:
  repository: 211125312142.dkr.ecr.ap-southeast-2.amazonaws.com/retail-store/ui
  tag: "sha-b896132d38318096ed8ff0d6403909b51f25a276"

replicas: 1
port: 8080

healthCheck:
  path: /actuator/health
  livenessDelay: 60
  readinessDelay: 30

# Env vars from docker-compose: RETAIL_UI_ENDPOINTS_*
# These point to backend services via Kubernetes DNS (cross-namespace)
env:
  - name: RETAIL_UI_ENDPOINTS_CATALOG
    value: "http://catalog.catalog-dev.svc.cluster.local:8080"
  - name: RETAIL_UI_ENDPOINTS_CARTS
    value: "http://cart.cart-dev.svc.cluster.local:8080"
  - name: RETAIL_UI_ENDPOINTS_CHECKOUT
    value: "http://checkout.checkout-dev.svc.cluster.local:8080"
  - name: RETAIL_UI_ENDPOINTS_ORDERS
    value: "http://orders.orders-dev.svc.cluster.local:8080"

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    memory: "1Gi"

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  annotations: {}

ingress:
  enabled: true
  className: external-nginx
  annotations: {}
  hosts:
    - paths:
        - path: /
          pathType: Prefix
  tls: []

# UI has no database
database:
  enabled: false