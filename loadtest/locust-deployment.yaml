# Locust Load Testing Deployment
# ==================================
# Replaces the bash traffic generator with a real load testing tool.
# Locust runs the locustfile.py script for each "user" in parallel.
#
# ACCESS:
#   kubectl port-forward -n ui-dev svc/locust 8089:8089
#   Open http://localhost:8089 in browser
#   Click "New Test", set:
#     - Number of users: 10 (start small)
#     - Spawn rate: 1 (1 user per second)
#     - Host: http://ui.ui-dev.svc.cluster.local:8080
#   Click "Start Swarming"
#
# DEMO FLOW:
#   1. Start with 10 users, watch baseline load
#   2. Stop, restart with 50 users → catalog CPU climbs
#   3. Stop, restart with 100 users → HPA scales catalog up
#   4. Stop test → HPA scales down after 5 minutes
#
# WHY ConfigMap for the locustfile:
#   Avoids building a custom Docker image. We mount the Python file
#   from a ConfigMap into the standard locustio/locust container.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-script
  namespace: ui-dev
data:
  locustfile.py: |
    """
    Retail Store Load Test — embedded in ConfigMap
    """
    from locust import HttpUser, task, between
    import random


    class RetailStoreUser(HttpUser):
        wait_time = between(1, 3)

        def on_start(self):
            self.client.get("/", name="01_homepage")

        @task(5)
        def browse_homepage(self):
            self.client.get("/", name="01_homepage")

        @task(8)
        def view_catalog(self):
            self.client.get("/catalog", name="02_catalog_page")

        @task(3)
        def view_cart(self):
            self.client.get("/cart", name="03_cart_page")

        @task(0)
        def add_to_cart(self):
            self.client.post(
                "/cart",
                data={
                    "productId": random.choice([
                        "510a0d7e-8e83-4193-b483-e27e09ddc34d",
                        "a0a4f044-b040-410d-8ead-4de0446aec7e",
                    ]),
                    "quantity": random.randint(1, 3),
                },
                name="04_add_to_cart"
            )

        @task(1)
        def go_to_checkout(self):
            self.client.get("/checkout", name="05_checkout_page")
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust
  namespace: ui-dev
  labels:
    app: locust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
  template:
    metadata:
      labels:
        app: locust
    spec:
      containers:
        - name: locust
          image: locustio/locust:2.31.5
          args:
            - "--locustfile=/scripts/locustfile.py"
            - "--host=http://ui.ui-dev.svc.cluster.local:8080"
          ports:
            - containerPort: 8089
              name: web
              protocol: TCP
          volumeMounts:
            - name: locust-script
              mountPath: /scripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: locust-script
          configMap:
            name: locust-script
---
apiVersion: v1
kind: Service
metadata:
  name: locust
  namespace: ui-dev
spec:
  selector:
    app: locust
  ports:
    - port: 8089
      targetPort: 8089
      protocol: TCP
      name: web
  type: ClusterIP
