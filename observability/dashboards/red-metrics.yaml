# Parameterized RED-metrics dashboard.
# Single dashboard covers all 5 services via $service template variable.
# Queries support multiple metric names because services use different
# instrumentation libraries:
#   - Spring Boot: http_server_requests_seconds_count (ui, cart, orders)
#   - Go/Gin:      gin_requests_total (catalog)
#   - Node:        http_request_duration_seconds_count (checkout)
# When SLOs migrate to Istio metrics simplify to one query.
apiVersion: v1
kind: ConfigMap
metadata:
  name: red-metrics-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"        # magic label: Grafana sidecar auto-imports
    app.kubernetes.io/part-of: retail-store
    app.kubernetes.io/component: observability
data:
  red-metrics.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Request Rate (RPS) — $service",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"}
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"$service\"}[$__rate_interval])) or sum(rate(gin_requests_total{job=\"$service\"}[$__rate_interval])) or sum(rate(http_request_duration_seconds_count{job=\"$service\"}[$__rate_interval]))",
              "legendFormat": "rps",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Error Rate (5xx) — $service",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {"mode": "palette-classic"},
              "min": 0,
              "max": 1
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "targets": [
            {
              "expr": "(sum(rate(http_server_requests_seconds_count{job=\"$service\",status=~\"5..\"}[$__rate_interval])) or sum(rate(gin_requests_total{job=\"$service\",code=~\"5..\"}[$__rate_interval])) or sum(rate(http_request_duration_seconds_count{job=\"$service\",status_code=~\"5..\"}[$__rate_interval]))) / (sum(rate(http_server_requests_seconds_count{job=\"$service\"}[$__rate_interval])) or sum(rate(gin_requests_total{job=\"$service\"}[$__rate_interval])) or sum(rate(http_request_duration_seconds_count{job=\"$service\"}[$__rate_interval])))",
              "legendFormat": "error rate",
              "refId": "A"
            }
          ]
        },
        {
          "title": "P99 Latency — $service",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "palette-classic"}
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_requests_seconds_bucket{job=\"$service\"}[$__rate_interval]))) or histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"$service\"}[$__rate_interval])))",
              "legendFormat": "p99",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["retail-store", "RED", "auto-imported"],
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(up{job=~\"ui|catalog|cart|orders|checkout\"}, job)",
            "refresh": 2,
            "includeAll": false,
            "multi": false,
            "current": {"text": "ui", "value": "ui"}
          }
        ]
      },
      "time": {"from": "now-30m", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Retail Store — RED metrics",
      "uid": "retail-store-red",
      "version": 1,
      "weekStart": ""
    }