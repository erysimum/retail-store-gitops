# SERVICE-LEVEL AVAILABILITY SLO — Cart
#
# Cart is critical to user flow but slightly less than catalog.
#
# TARGET: 99.9% availability over 1 day
# ERROR BUDGET: 0.1% × 1 day = 86.4 seconds of failure allowed per day
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: cart-availability
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: cart
spec:
  target: "99.9"
  window: 1d
  description: "Cart service availability — required for shopping flow"

  indicator:
    ratio:
      errors:
        metric: http_server_requests_seconds_count{job="cart",status=~"5.."}
      total:
        metric: http_server_requests_seconds_count{job="cart"}