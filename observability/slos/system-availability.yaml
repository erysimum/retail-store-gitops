# SYSTEM-LEVEL AVAILABILITY SLO
# This is the user-facing contract. UI is the entry point — if UI is healthy,
# users can shop. We measure system availability via UI's success rate.
#
# TARGET: 99.9% availability over 1 day
# ERROR BUDGET: 0.1% × 1 day = 86.4 seconds of downtime allowed per day
#
# WINDOW: 1 day (chosen for demo visibility — production would use 28d)
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: system-availability
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: system
spec:
  target: "99.9"
  window: 1d
  description: "User-facing availability of the retail store, measured at UI entry point"

  indicator:
    ratio:
      errors:
        metric: http_server_requests_seconds_count{job="ui",status=~"5.."}
      total:
        metric: http_server_requests_seconds_count{job="ui"}