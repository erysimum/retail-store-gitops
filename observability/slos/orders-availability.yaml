# SERVICE-LEVEL AVAILABILITY SLO — Orders
#
# Orders is business-critical: when this fails, no purchases complete.
# Database-heavy (PostgreSQL), so we account for some DB-induced flakiness.
#
# TARGET: 99.9% availability over 1 day
# ERROR BUDGET: 0.1% × 1 day = 86.4 seconds of failure allowed per day
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: orders-availability
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: orders
spec:
  target: "99.9"
  window: 1d
  description: "Orders service availability — business-critical purchase persistence"

  indicator:
    ratio:
      errors:
        metric: http_server_requests_seconds_count{job="orders",status=~"5.."}
      total:
        metric: http_server_requests_seconds_count{job="orders"}