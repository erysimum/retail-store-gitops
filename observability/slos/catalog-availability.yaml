# SERVICE-LEVEL AVAILABILITY SLO — Catalog
#
# Catalog is critical: every page load on UI calls catalog.
# Tighter SLO than system because backend failures cascade.
#
# TARGET: 99.95% availability over 1 day
# ERROR BUDGET: 0.05% × 1 day = 43.2 seconds of failure allowed per day
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: catalog-availability
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: catalog
spec:
  target: "99.95"
  window: 1d
  description: "Catalog service availability — high-traffic backend"

  indicator:
    ratio:
      errors:
        metric: gin_requests_total{job="catalog",code=~"5.."}
      total:
        metric: gin_requests_total{job="catalog"}