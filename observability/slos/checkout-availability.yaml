# SERVICE-LEVEL AVAILABILITY SLO — Checkout
#
# Checkout orchestrates orders + cart + redis. Most complex service,
# so we set a slightly looser SLO. Still tight enough that real outages
# get caught.
#
# NOTE: Checkout's HTTP metrics aren't ideal (Node.js prom-client default
# doesn't expose request counters by default in this image). We use
# nodejs_eventloop_lag_seconds as a health proxy if needed, but for now
# we attempt http_request_duration_seconds_count which prom-client exposes.
#
# IF THIS FAILS TO GENERATE RULES: the metric name is wrong for Checkout's
# Node.js exporter. We'll adjust based on what /metrics actually shows.
#
# TARGET: 99.5% availability over 1 day
# ERROR BUDGET: 0.5% × 1 day = 7.2 minutes of failure allowed per day
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: checkout-availability
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: checkout
spec:
  target: "99.5"
  window: 1d
  description: "Checkout service availability — order orchestration"

  indicator:
    ratio:
      errors:
        metric: http_request_duration_seconds_count{job="checkout",status_code=~"5.."}
      total:
        metric: http_request_duration_seconds_count{job="checkout"}