# SERVICE-LEVEL AVAILABILITY SLO — Orders (Istio metrics)
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: orders-availability-istio
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: orders
    pyrra.dev/source: istio
spec:
  target: "99.9"
  window: 1d
  description: "Orders service availability via Envoy sidecar (Istio metrics)"

  indicator:
    ratio:
      errors:
        metric: istio_requests_total{destination_service_name="orders",destination_service_namespace="orders-dev",reporter="destination",response_code=~"5.."}
      total:
        metric: istio_requests_total{destination_service_name="orders",destination_service_namespace="orders-dev",reporter="destination"}