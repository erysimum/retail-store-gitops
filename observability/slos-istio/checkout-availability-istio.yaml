# SERVICE-LEVEL AVAILABILITY SLO — Checkout (Istio metrics)
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: checkout-availability-istio
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: checkout
    pyrra.dev/source: istio
spec:
  target: "99.5"
  window: 1d
  description: "Checkout service availability via Envoy sidecar (Istio metrics)"

  indicator:
    ratio:
      errors:
        metric: istio_requests_total{destination_service_name="checkout",destination_service_namespace="checkout-dev",reporter="destination",response_code=~"5.."}
      total:
        metric: istio_requests_total{destination_service_name="checkout",destination_service_namespace="checkout-dev",reporter="destination"}