# SYSTEM-LEVEL AVAILABILITY SLO (Istio metrics)
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: system-availability-istio
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: system
    pyrra.dev/source: istio
spec:
  target: "99.9"
  window: 1d
  description: "End-to-end system availability via UI sidecar (Istio metrics)"

  indicator:
    ratio:
      errors:
        metric: istio_requests_total{destination_service_name="ui",destination_service_namespace="ui-dev",reporter="destination",response_code=~"5.."}
      total:
        metric: istio_requests_total{destination_service_name="ui",destination_service_namespace="ui-dev",reporter="destination"}