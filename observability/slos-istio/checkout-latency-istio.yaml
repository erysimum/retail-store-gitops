# SERVICE-LEVEL LATENCY SLO — Checkout
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: checkout-latency-istio
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: checkout
    pyrra.dev/source: istio
spec:
  target: "99"
  window: 1d
  description: "99% of checkout requests complete in under 1000ms"

  indicator:
    latency:
      success:
        metric: istio_request_duration_milliseconds_bucket{destination_service_name="checkout",destination_service_namespace="checkout-dev",reporter="destination",le="1000"}
      total:
        metric: istio_request_duration_milliseconds_count{destination_service_name="checkout",destination_service_namespace="checkout-dev",reporter="destination"}