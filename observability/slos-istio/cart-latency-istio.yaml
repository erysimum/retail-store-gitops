# SERVICE-LEVEL LATENCY SLO — Cart
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: cart-latency-istio
  namespace: monitoring
  labels:
    pyrra.dev/team: platform
    pyrra.dev/tier: service
    pyrra.dev/service: cart
    pyrra.dev/source: istio
spec:
  target: "99"
  window: 1d
  description: "99% of cart requests complete in under 250ms"

  indicator:
    latency:
      success:
        metric: istio_request_duration_milliseconds_bucket{destination_service_name="cart",destination_service_namespace="cart-dev",reporter="destination",le="250"}
      total:
        metric: istio_request_duration_milliseconds_count{destination_service_name="cart",destination_service_namespace="cart-dev",reporter="destination"}