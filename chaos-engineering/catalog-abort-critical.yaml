# CHAOS — Catalog HTTP abort, CRITICAL tier
#
# Aborts 3% of requests with HTTP 500. Calibrated to produce a
# ~30x burn rate against catalog-availability SLO (target 99.95%).
#
# Expected alert routing: PagerDuty incident + Slack #alerts critical.
#
# Apply / remove:
#   kubectl apply -f chaos-engineering/catalog-abort-critical.yaml
#   kubectl delete -f chaos-engineering/catalog-abort-critical.yaml
#
# CANNOT run simultaneously with catalog-abort-warning.yaml
# (same metadata.name). Apply one at a time.
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: catalog-abort-fault
  namespace: catalog-dev
spec:
  hosts:
    - catalog
  http:
    - fault:
        abort:
          percentage:
            value: 3
          httpStatus: 500
      route:
        - destination:
            host: catalog